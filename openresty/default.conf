map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8096;

    client_max_body_size 100m;
    client_body_buffer_size 512k;

    # DEBUG: log all playback-adjacent requests with UA + method so we can see what the client actually hits.
    # Remove this block once we're done observing.
    location ~* ^/(Items/[^/]+/(PlaybackInfo|PlaybackBitrateTest)|Videos/[^/]+/(stream|master|hls|main)|Audio/[^/]+/(stream|universal)|Sessions/Playing) {
        access_by_lua_block {
            ngx.log(ngx.ERR, string.format("[debug-path] %s %s  UA=%q",
                ngx.req.get_method(), ngx.var.request_uri, ngx.var.http_user_agent or "-"))
        }
        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/Items/[^/]+/PlaybackInfo {
        access_by_lua_block {
            local function summarize(profiles)
                if not profiles then return "nil" end
                local parts = {}
                for _, p in ipairs(profiles) do
                    if p.Type == "Video" then
                        table.insert(parts, string.format("{%s:%s}", p.Container or "?", p.VideoCodec or "?"))
                    end
                end
                return "[" .. table.concat(parts, ",") .. "]"
            end

            ngx.log(ngx.ERR, string.format("[hevc-filter] ==> %s %s  UA=%q",
                ngx.req.get_method(), ngx.var.request_uri, ngx.var.http_user_agent or "-"))

            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if not body then
                local body_file = ngx.req.get_body_file()
                if body_file then
                    local f = io.open(body_file, "rb")
                    if f then
                        body = f:read("*a")
                        f:close()
                    end
                end
            end
            if not body or #body == 0 then
                ngx.log(ngx.ERR, "[hevc-filter] no body, skipping filter")
                return
            end

            local cjson = require("cjson")
            local ok, data = pcall(cjson.decode, body)
            if not ok or not data then
                ngx.log(ngx.ERR, "[hevc-filter] body is not JSON, skipping filter")
                return
            end
            if not data.DeviceProfile then
                ngx.log(ngx.ERR, "[hevc-filter] body has no DeviceProfile, skipping filter")
                return
            end

            local function filter_hevc(profiles)
                if not profiles then return profiles end
                local filtered = {}
                for _, p in ipairs(profiles) do
                    if p.Type == "Video" and p.VideoCodec then
                        local codecs = {}
                        for codec in string.gmatch(p.VideoCodec, "[^,]+") do
                            local c = codec:lower():gsub("^%s+", ""):gsub("%s+$", "")
                            if c ~= "hevc" and c ~= "h265" then
                                table.insert(codecs, codec)
                            end
                        end
                        if #codecs > 0 then
                            p.VideoCodec = table.concat(codecs, ",")
                            table.insert(filtered, p)
                        end
                    else
                        table.insert(filtered, p)
                    end
                end
                return filtered
            end

            local dp_before_s = summarize(data.DeviceProfile.DirectPlayProfiles)
            local ds_before_s = summarize(data.DeviceProfile.DirectStreamProfiles)

            data.DeviceProfile.DirectPlayProfiles = filter_hevc(data.DeviceProfile.DirectPlayProfiles)
            data.DeviceProfile.DirectStreamProfiles = filter_hevc(data.DeviceProfile.DirectStreamProfiles)

            local dp_after_s = summarize(data.DeviceProfile.DirectPlayProfiles)
            local ds_after_s = summarize(data.DeviceProfile.DirectStreamProfiles)

            local new_body = cjson.encode(data)
            ngx.req.set_body_data(new_body)
            ngx.log(ngx.ERR, string.format("[hevc-filter] ProfileName=%q  DirectPlay %s -> %s  DirectStream %s -> %s",
                data.DeviceProfile.Name or "-", dp_before_s, dp_after_s, ds_before_s, ds_after_s))
        }

        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
