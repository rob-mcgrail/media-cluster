map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8096;

    client_max_body_size 100m;
    client_body_buffer_size 512k;

    location ~ ^/Items/[^/]+/PlaybackInfo {
        access_by_lua_block {
            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if not body then
                local body_file = ngx.req.get_body_file()
                if body_file then
                    local f = io.open(body_file, "rb")
                    if f then
                        body = f:read("*a")
                        f:close()
                    end
                end
            end
            if not body or #body == 0 then return end

            local cjson = require("cjson")
            cjson.decode_array_with_array_mt(true)
            local ok, data = pcall(cjson.decode, body)
            if not ok or not data or not data.DeviceProfile then return end

            local function filter_hevc(profiles)
                if not profiles then return profiles end
                local filtered = {}
                for _, p in ipairs(profiles) do
                    if p.Type == "Video" and p.VideoCodec then
                        local codecs = {}
                        for codec in string.gmatch(p.VideoCodec, "[^,]+") do
                            local c = codec:lower():gsub("^%s+", ""):gsub("%s+$", "")
                            if c ~= "hevc" and c ~= "h265" then
                                table.insert(codecs, codec)
                            end
                        end
                        if #codecs > 0 then
                            p.VideoCodec = table.concat(codecs, ",")
                            table.insert(filtered, p)
                        end
                    else
                        table.insert(filtered, p)
                    end
                end
                return filtered
            end

            data.DeviceProfile.DirectPlayProfiles = filter_hevc(data.DeviceProfile.DirectPlayProfiles)
            data.DeviceProfile.DirectStreamProfiles = filter_hevc(data.DeviceProfile.DirectStreamProfiles)
            data.DeviceProfile.TranscodingProfiles = filter_hevc(data.DeviceProfile.TranscodingProfiles)

            ngx.req.set_body_data(cjson.encode(data))
        }

        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;

        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
