# go2rtc: RTSP-to-browser proxy for the Reolink floodlight cams.
#
# Each stream is the camera's main (HD, ~1920×1080, ~15-30 FPS) channel.
# go2rtc transcodes/repacks on demand and exposes:
#   MJPEG :        http://go2rtc:1984/api/stream.mjpeg?src=<name>
#   WebRTC HTML:   http://go2rtc:1984/stream.html?src=<name>
#   Snapshot JPEG: http://go2rtc:1984/api/frame.jpeg?src=<name>
#
# Credentials come from .api_keys via env_file in docker-compose.yml.
streams:
  # Reolink F-series streams the main channel as H.265 — browsers and
  # the MJPEG converter can't consume it directly. Each stream has two
  # entries: the raw RTSP H.265 source, and an ffmpeg variant that
  # transcodes to MJPEG for <img> consumption. go2rtc routes consumers
  # to whichever variant matches their codec request.
  front_door:
    - rtsp://admin:${REOLINK_FRONT_DOOR_PASSWORD}@192.168.1.3:554/h265Preview_01_main
    # MJPEG variant for the modal's <img> fallback path. Tried adding
    # an H.264 transcode variant for MSE but Reolink's HEVC stream
    # has B-frame reference structures that break Intel's VAAPI HEVC
    # decoder ("Could not find ref with POC X"). The modal now uses
    # the sub-stream MP4 path instead, which is H.264-native and
    # needs no transcoding at all.
    - ffmpeg:front_door#video=mjpeg#hardware
  deck:
    - rtsp://admin:${REOLINK_DECK_PASSWORD}@192.168.1.8:554/h265Preview_01_main
    - ffmpeg:deck#video=mjpeg#hardware

  # The cameras' sub channel is H.264 panoramic 1920×576 — used for the
  # dashboard tile preview. ~1/8 the pixel data of the main stream, and
  # the QSV pipeline keeps CPU near zero. The HD main stream above is
  # only consumed when the user opens the fullscreen modal.
  front_door_sub:
    - rtsp://admin:${REOLINK_FRONT_DOOR_PASSWORD}@192.168.1.3:554/h264Preview_01_sub
    - ffmpeg:front_door_sub#video=mjpeg#hardware
  deck_sub:
    - rtsp://admin:${REOLINK_DECK_PASSWORD}@192.168.1.8:554/h264Preview_01_sub
    - ffmpeg:deck_sub#video=mjpeg#hardware

  # Mobile-targeted MJPEG variants — sub stream scaled to 960×288 (half
  # the linear resolution of the sub stream → 1/4 the per-frame JPEG
  # bytes). Mobile Chrome's multipart/x-mixed-replace decoder wedges
  # under sustained backpressure when fed full-rate 1920×576 MJPEG —
  # JPEG-decode thread falls behind, HTTP flow-control window closes,
  # the <img> tag stops rendering after ~1s of frames. A smaller frame
  # keeps it under that threshold.
  front_door_mobile:
    - ffmpeg:front_door_sub#video=mjpeg#hardware#width=960#height=288
  deck_mobile:
    - ffmpeg:deck_sub#video=mjpeg#hardware#width=960#height=288

api:
  origin: '*'   # CORS open — only reachable via the docker network anyway

log:
  level: info
