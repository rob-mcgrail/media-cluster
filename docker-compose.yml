services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.8ubu2404-ls28
    container_name: jellyfin
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_JELLYFIN}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    volumes:
      - ${CONFIG_ROOT}/jellyfin:/config
      - ${DATA_ROOT}/media:/data/media
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "993"
    ports:
      - 8096:8096
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls307
    container_name: sonarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_SONARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls299
    container_name: radarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_RADARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls141
    container_name: prowlarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_PROWLARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r3-ls450
    container_name: qbittorrent
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_QBITTORRENT}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_ROOT}/qbittorrent:/config
      - ${DATA_ROOT}/torrents:/data/torrents
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:1.9.10
    container_name: go2rtc
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro
    # Intel iGPU for VAAPI/QSV — offloads H.265 decode + H.264/MJPEG
    # encode from the CPU. Same render-group hand-off Jellyfin uses.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "993"   # render group (matches host)
    # 1984 = HTTP API + web UI (only reached via docker network, no host port)
    # 8554 = RTSP server
    # 8555 = WebRTC TCP (for browser RTC negotiation if we ever wire it)
    restart: unless-stopped

  homeassistant:
    # Custom build that layers the Intel iHD VAAPI driver on top of the
    # stock HA image — required for QSV-accelerated camera-clip recording.
    # Build context is its own dir (not ./homeassistant which is the
    # bind-mounted /config and would tarball the HA database into every
    # image build).
    build: ./homeassistant-image
    container_name: homeassistant
    user: "${PUID_HOMEASSISTANT}:${PGID}"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    # Intel iGPU for QSV-accelerated camera-clip recording (the
    # shell_command.record_* ffmpeg pipelines decode H.265 + encode
    # H.264 entirely on the GPU).
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "993"   # render group (matches host)
    environment:
      - TZ=${TZ}
    volumes:
      # Whole HA /config lives in the repo. A .gitignore inside
      # homeassistant/ keeps only YAMLs + markdown tracked; HA's runtime
      # crap (DB, .storage, logs, secrets) stays out of git.
      - ./homeassistant:/config
      # Event-triggered camera clips. HA's camera.record service writes
      # 30s clips here on person/vehicle detection. Lives on /mnt/disk2
      # (single-disk, no mergerfs distribution) so writes are predictable
      # and a 7-day rotating store has a fixed home.
      - /mnt/disk2/cam-recordings:/media/cam-recordings
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8123:8123
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:0.56.1
    container_name: navidrome
    user: "${PUID_NAVIDROME}:${PGID}"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - TZ=${TZ}
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_SCANSCHEDULE=@every 1h
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
    volumes:
      - ${CONFIG_ROOT}/navidrome:/data
      - /archive/music:/music:ro
    ports:
      - 4533:4533
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls344
    container_name: bazarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_BAZARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/bazarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - 6767:6767
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: dashboard
    # Loopback-only port binding so host-side cron jobs (run-recs.sh
    # etc.) can POST to /api/event without going through Caddy. NOT
    # exposed to the LAN — Caddy on 443 is the public path.
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    environment:
      # Pi-hole panel mode. Options:
      #   off     — panel hidden entirely (default — we've found it uninteresting)
      #   blocks  — top 20 blocked domains in the last 24h
      #   clients — per-client allowed/blocked counts (only useful when Pi-hole
      #             is also the DHCP server, so it can see individual client IPs)
      - PIHOLE_PANEL=off
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./movie-bot-data:/movie-bot-data
      - ./dashboard/public:/app/public
      - ${DATA_ROOT}:/hostdata:ro
      - ${CONFIG_ROOT}/pihole/etc-pihole/dhcp.leases:/pihole/dhcp.leases:ro
      # Read-only access to HA's cam-recordings so the dashboard can
      # list + serve them in the Floodlights panel.
      - /mnt/disk2/cam-recordings:/cam-recordings:ro
    restart: unless-stopped

  # Tube Archivist — YouTube channel/playlist archiver. Three-container
  # stack (app + Elasticsearch + Redis). Surfaces in Jellyfin via the
  # official `jellyfin-plugin-tubearchivist` plugin which reads NFO
  # sidecars TA writes per video. Used as the kids' YouTube library
  # (Bluey clips, Ms Rachel, Blippi, etc.) — channels become "TV
  # shows", uploads become "episodes".
  tubearchivist:
    image: bbilly1/tubearchivist:latest
    container_name: tubearchivist
    # No user: directive — bbilly1/tubearchivist's entrypoint runs as
    # root, chowns its mounts to HOST_UID:HOST_GID, then drops to that
    # user before launching Django. (Same pattern linuxserver/* images
    # use with PUID/PGID — different env var names.)
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    environment:
      - ES_URL=http://archivist-es:9200
      - REDIS_CON=redis://archivist-redis:6379
      # Tells TA's entrypoint who owns the /youtube + /cache mounts so
      # it doesn't try to chown them on startup. Same pattern other
      # bind-mounted services use (see PUID_* in .env).
      - HOST_UID=${PUID_TUBEARCHIVIST}
      - HOST_GID=${PGID}
      # Group-writable umask so other media-group services (esp.
      # Jellyfin's NFO/metadata writer) can write into TA-created
      # channel folders. Without this TA creates dirs as 755 and
      # Jellyfin's metadata save fails with "Access denied" even
      # though it's in the same group.
      - UMASK=${UMASK}
      # Allowed hostnames Django will respond to (space-separated).
      # Add any new public hostname here as well as in the Caddyfile.
      # Must include the https:// scheme — TA's TA_HOST parser
      # registers each entry verbatim into CSRF_TRUSTED_ORIGINS, and
      # Django 4+ requires the scheme to match the request Origin
      # exactly. Without https:// every POST through Caddy gets a
      # CSRF rejection that the UI handles by bouncing back to login.
      - TA_HOST=https://tubearchivist.${DOMAIN} localhost
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/tubearchivist/cache:/cache
      # Mount the kids/youtube subtree only — TA can't see/touch the
      # rest of the media library.
      - ${DATA_ROOT}/media/kids/youtube:/youtube
    depends_on:
      - archivist-es
      - archivist-redis
    restart: unless-stopped

  # Redis + Elasticsearch use named volumes (managed by docker, owned
  # by their respective container's internal users). Unlike the
  # PUID/PGID services above, these images don't honour host UIDs and
  # the data they store (search indices, ephemeral queues) isn't
  # human-browsable anyway — bind-mounting under ${CONFIG_ROOT} would
  # just create an ownership headache for zero gain.
  archivist-redis:
    image: redis/redis-stack-server:latest
    container_name: archivist-redis
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    volumes:
      - tubearchivist-redis:/data
    depends_on:
      - archivist-es
    restart: unless-stopped

  archivist-es:
    image: bbilly1/tubearchivist-es:latest
    container_name: archivist-es
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    environment:
      - xpack.security.enabled=true
      - discovery.type=single-node
      - path.repo=/usr/share/elasticsearch/data/snapshot
      # ES is greedy by default — cap heap so it doesn't fight Jellyfin
      # transcodes for RAM. 1GB is plenty for a single-node deployment
      # indexing a few kids' channels.
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - tubearchivist-es:/usr/share/elasticsearch/data
    restart: unless-stopped

  caddy:
    build: ./caddy
    container_name: caddy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ${CONFIG_ROOT}/caddy/data:/data
      - ${CONFIG_ROOT}/caddy/config:/config
    ports:
      - 443:443
    dns:
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  jellyfin-proxy:
    image: openresty/openresty:alpine
    container_name: jellyfin-proxy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    volumes:
      - ./openresty/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jellyfin
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

  pihole:
    image: pihole/pihole:2026.04.0
    container_name: pihole
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    environment:
      - TZ=${TZ}
      - FTLCONF_dns_upstreams=1.1.1.1;1.0.0.1
      - FTLCONF_dns_listeningMode=bind
      - FTLCONF_dns_interface=eno1
      - FTLCONF_database_maxDBdays=7
      - FTLCONF_webserver_port=7001o,[::]:7001o
      - FTLCONF_dns_piholePTR=NONE
      - FTLCONF_dns_specialDomains_iCloudPrivateRelay=false
    volumes:
      - ${CONFIG_ROOT}/pihole/etc-pihole:/etc/pihole
      - ${CONFIG_ROOT}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  # Tube Archivist — Redis + Elasticsearch indices. Named volumes (not
  # bind mounts) because the images don't honour host PUID/PGID and
  # the contents are internal indexer state, not user content.
  tubearchivist-redis:
  tubearchivist-es:

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
