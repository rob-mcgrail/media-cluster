services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.8ubu2404-ls28
    container_name: jellyfin
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_JELLYFIN}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    volumes:
      - ${CONFIG_ROOT}/jellyfin:/config
      - ${DATA_ROOT}/media:/data/media
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "993"
    ports:
      - 8096:8096
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls307
    container_name: sonarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_SONARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls299
    container_name: radarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_RADARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls141
    container_name: prowlarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_PROWLARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r3-ls450
    container_name: qbittorrent
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_QBITTORRENT}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_ROOT}/qbittorrent:/config
      - ${DATA_ROOT}/torrents:/data/torrents
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls344
    container_name: bazarr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - PUID=${PUID_BAZARR}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/bazarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - 6767:6767
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: dashboard
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    volumes:
      - ./prompts:/prompts
      - ./dashboard/public:/app/public
      - ${DATA_ROOT}:/hostdata:ro
    restart: unless-stopped

  caddy:
    build: ./caddy
    container_name: caddy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    env_file:
      - .api_keys
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ${CONFIG_ROOT}/caddy/data:/data
      - ${CONFIG_ROOT}/caddy/config:/config
    ports:
      - 443:443
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
